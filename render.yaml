services:
  - type: web
    name: morning-cards-api
    env: python
    sourceDir: backend/
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: CORS_ORIGINS
        value: https://morning-cards.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: morning-cards-db
          property: connectionString

databases:
  - name: morning-cards-db
    databaseName: morning_cards
    plan: free
